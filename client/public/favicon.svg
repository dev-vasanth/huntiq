<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Target / crosshair icon in white -->
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="8.5" stroke="white" stroke-width="1.8" fill="none" opacity="0.9"/>
  <!-- Middle circle -->
  <circle cx="16" cy="16" r="4.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="white"/>
  <!-- Cross lines -->
  <line x1="16" y1="5" x2="16" y2="9.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="22.5" x2="16" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="5" y1="16" x2="9.5" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22.5" y1="16" x2="27" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
